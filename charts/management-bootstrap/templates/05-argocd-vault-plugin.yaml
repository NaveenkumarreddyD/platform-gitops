apiVersion: v1
kind: ConfigMap
metadata:
  name: cmp-plugin
  namespace: {{ .Values.argoNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
data:
  avp-helm.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: argocd-vault-plugin-helm
    spec:
      version: v1.0
      init:
        command: ["sh", "-c"]
        args: ["helm dependency build || true"]
      generate:
        command: ["sh", "-c"]
        args:
          - 'helm template "$ARGOCD_APP_NAME" --namespace "$ARGOCD_APP_NAMESPACE" --include-crds -f <(echo "$HELM_VALUES") . | argocd-vault-plugin generate -'
      discover:
        find:
          command: ["sh", "-c"]
          args: ["find . -name Chart.yaml"]
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-vault-plugin-credentials
  namespace: {{ .Values.argoNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
type: Opaque
stringData:
  AVP_TYPE: vault
  AVP_AUTH_TYPE: k8s
  AVP_K8S_ROLE: {{ .Values.avp.role }}
  VAULT_ADDR: {{ include "mb.vaultAddr" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-repo-server-tokenreview
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: {{ .Values.repoServerServiceAccount }}
    namespace: {{ .Values.argoNamespace }}
