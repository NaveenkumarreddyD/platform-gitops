# Edit values-management.yaml (repo root) to override the CHANGE_ME entries.
account:
  id: mas
argoNamespace: openshift-gitops
repoServerServiceAccount: openshift-gitops-repo-server

# ibm-mas-gitops source charts (your private mirror)
source:
  repo_url: CHANGE_ME_IBM_MAS_GITOPS_SOURCE_REPO_URL
  revision: "8.0.0"

# mas-gitops-config (single branch holding all clusters)
generator:
  repo_url: CHANGE_ME_MAS_GITOPS_CONFIG_REPO_URL
  revision: main

vault:
  enabled: true                 # false if Vault already exists / is managed elsewhere
  host: CHANGE_ME_VAULT_HOST     # e.g. vault.apps.mgmt.lac1.biz  (also the AVP VAULT_ADDR)
  chartVersion: "0.32.0"
  imageRepository: registry.connect.redhat.com/hashicorp/vault
  imageTag: "1.21.2-ubi"
  storageClass: isilon
  dataSize: 20Gi
  auditSize: 10Gi
  replicas: 3

avp:
  role: mas-gitops              # Vault k8s-auth role bound to the mgmt repo-server SA

accountRoot:
  autoSync: false               # keep MAS on manual sync until Vault + secrets are ready
  clusterAdminRole: true
  applicationAdminRole: true
