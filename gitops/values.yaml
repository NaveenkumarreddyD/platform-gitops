# ============ GLOBAL defaults (every env) ============
rootOnly: false   # apply.sh sets =true to emit ONLY the root app; ArgoCD leaves it false -> renders all children
project: mas
argoNamespace: openshift-gitops

platform:  { repo_url: "https://gitlab.lac1.biz/gitops/platform-gitops.git", revision: main }
source:    { repo_url: "https://gitlab.lac1.biz/gitops/ibm-mas-gitops.git", revision: "8.0.0" }
generator: { repo_url: "https://gitlab.lac1.biz/gitops/mas-gitops-config.git", revision: main }

account: { id: mas }
storageClass: isilon
images: { oc: "registry.redhat.io/openshift4/ose-cli:latest", vault: "hashicorp/vault:1.18" }

vault:
  enabled: true
  addr: http://vault-active.vault.svc.cluster.local:8200
  writerRole: mas-gitops-writer
  chartVersion: "0.32.0"
  imageRepository: registry.connect.redhat.com/hashicorp/vault
  imageTag: "1.21.2-ubi"
  dataSize: 20Gi
  auditSize: 10Gi
  replicas: 3
  host: vault.example.local                # OVERRIDE per env (env-common)
  # Opt-in auto-unseal (OSS, no cloud KMS): a CronJob in ns/vault re-unseals sealed raft nodes
  # from a Kubernetes Secret. Enable enable.vaultUnseal too, and create the keys Secret with
  # scripts/init-vault.sh --store-k8s-secret (or scripts/setup-vault-autounseal.sh).
  autoUnseal:
    enabled: false
    keysSecret: vault-unseal-keys
    schedule: "*/2 * * * *"

# Declarative orchestration (official model): account-root and registration-sync AUTO-SYNC.
# ArgoCD + the registered CR healthchecks gate the waves on real readiness, and selfHeal retries
# until prerequisites exist — so you do NOT hand-sync the cascade.
# REQUIRED ORDER: seed Vault (static secrets via load-secrets.sh + the public cert via
# load-mas-public-cert.sh) and let MongoDB come up BEFORE the cascade can fully render. The
# account-root will fail-and-retry harmlessly until those are present, then selfHeal converges.
accountRoot: { autoSync: true, clusterAdminRole: true, applicationAdminRole: true }
registrationSync: { autoSync: true }   # vault-sync apps auto-run; their jobs gate on SLS/DRO readiness internally
grafana: { namespace: grafana }
operatorsNamespace: platform-operators
mongoOperator: { repo: "https://mongodb.github.io/helm-charts", chart: community-operator, version: "0.9.0" }   # MongoDB Community Operator (supports mongod 6.0.12)

# which Applications to emit
enable:
  vault: true
  vaultUnseal: false        # set true (with vault.autoUnseal.enabled) to deploy the auto-unseal CronJob
  accountRoot: true
  masCerts: false
  operators: true
  mongodb: true
  jdbc: true
  registrationSync: true
  grafana: false

# duplicates owned by app-of-apps — keep off here

# ---- per-env placeholders (set in <env>-* files) ----
clusterId: ""
instanceId: ""
workspaceId: ""
mongo: { namespace: "", members: 3, version: "6.0.12", adminUser: admin }
jdbc:  { sslEnabled: false, autoSync: true }   # autoSync safe: PreSync hook awaits the JdbcCfg CRD first
dro:   { namespace: ibm-software-central, syncEnabled: false }
sls:   { syncEnabled: true }
masCerts:
  core: true
  manage: true
