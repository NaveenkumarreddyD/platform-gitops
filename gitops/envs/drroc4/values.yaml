instanceId: drgitopsapp
workspaceId: drgitopswks
mongo: { namespace: mongo-drgitops, members: 3, version: "7.0.23" }
jdbc:  { sslEnabled: false }
# Declarative: DRO + SLS are always deployed, so both harvest->Vault apps are always enabled.
# The harvest jobs gate on their component's readiness internally, so they wait (not fail) until
# SLS/DRO are up, then write the registration + served CA into Vault.
dro:   { namespace: ibm-software-central, syncEnabled: true }
sls:   { syncEnabled: true }
enable:
  grafana: false
  masCerts: true
