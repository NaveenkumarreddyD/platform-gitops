# wave 55 — grafana-operator (OLM, pinned v5.21.2 for OCP < 4.19)
{{- if and (not .Values.rootOnly) .Values.enable.grafana }}
---
# community grafana-operator (OLM) pinned to v5.21.2 (v5.22.x CRD breaks on OCP < 4.19)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-operator
  namespace: {{ .Values.argoNamespace }}
  labels: { app.kubernetes.io/part-of: mas-platform }
  annotations: { argocd.argoproj.io/sync-wave: "55" }
  finalizers: [ resources-finalizer.argocd.argoproj.io ]
spec:
  revisionHistoryLimit: 10
  project: {{ .Values.project }}
  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ .Values.operatorsNamespace }}
  source:
    repoURL: {{ .Values.platform.repo_url | quote }}
    targetRevision: {{ .Values.platform.revision | quote }}
    path: workloads/operators
  syncPolicy:
    automated: { prune: {{ .Values.auto_delete }}, selfHeal: true }
    retry:
      limit: 5
      backoff: { duration: 5s, factor: 2, maxDuration: 3m }
    syncOptions: [ "CreateNamespace=true", "ServerSideApply=true" ]
{{- end }}
