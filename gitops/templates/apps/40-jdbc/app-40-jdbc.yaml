# wave 40 — JDBC config (local chart via AVP plugin)
{{- if and (not .Values.rootOnly) .Values.enable.jdbc }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.instanceId }}-jdbc-system
  namespace: {{ .Values.argoNamespace }}
  labels:
    app.kubernetes.io/part-of: mas-platform
  annotations:
    argocd.argoproj.io/sync-wave: "40"
  finalizers: [ resources-finalizer.argocd.argoproj.io ]
spec:
  revisionHistoryLimit: 10
  project: {{ .Values.project }}
  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ include "gitops.coreNs" . }}
  source:
    repoURL: {{ .Values.platform.repo_url | quote }}
    targetRevision: {{ .Values.platform.revision | quote }}
    path: workloads/jdbc
    plugin:
      name: argocd-vault-plugin-helm
      env:
        - name: HELM_VALUES
          value: |
            instance_id: {{ .Values.instanceId }}
            cli_image_repo: {{ .Values.images.oc }}
            mas_config_name: {{ .Values.instanceId }}-jdbc-system
            jdbc_ssl_enabled: {{ .Values.jdbc.sslEnabled }}
            jdbc_url: "<path:{{ include "gitops.path" . }}/jdbc-system#jdbc_url>"
            jdbc_username: "<path:{{ include "gitops.path" . }}/jdbc-system#username>"
            jdbc_password: "<path:{{ include "gitops.path" . }}/jdbc-system#password>"
            jdbc_ca_crt: "<path:{{ include "gitops.path" . }}/jdbc-system#ca.crt>"
  syncPolicy:
    {{- if .Values.jdbc.autoSync }}
    # Safe to auto-sync: a PreSync hook (workloads/jdbc/templates/presync-await-crd.yaml)
    # blocks until the JdbcCfg CRD installed by MAS Suite is Established, so ArgoCD never
    # tries to apply the JdbcCfg before its CRD exists. selfHeal retries until ready.
    automated:
      selfHeal: true
      prune: true
    {{- end }}
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
{{- end }}
