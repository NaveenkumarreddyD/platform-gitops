# wave 20 — MongoDB Community Operator (upstream Helm chart, IBM way)
{{- if and (not .Values.rootOnly) .Values.enable.mongodb }}
---
# MongoDB Community Operator the IBM way: the operator's own Helm chart (creates the
# mongodb-kubernetes-operator deployment), NOT OLM. Watches the dedicated mongo namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb-community-operator-{{ .Values.instanceId }}
  namespace: {{ .Values.argoNamespace }}
  labels: { app.kubernetes.io/part-of: mas-platform }
  annotations: { argocd.argoproj.io/sync-wave: "20" }
  finalizers: [ resources-finalizer.argocd.argoproj.io ]
spec:
  revisionHistoryLimit: 10
  project: {{ .Values.project }}
  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ include "gitops.mongoNs" . }}
  source:
    repoURL: {{ .Values.mongoOperator.repo }}
    chart: {{ .Values.mongoOperator.chart }}
    targetRevision: {{ .Values.mongoOperator.version | quote }}
    helm:
      releaseName: mongodb-community-operator
      values: |
        community-operator-crds: { enabled: true }
        operator: { watchNamespace: {{ include "gitops.mongoNs" . }} }
        mongodb:
          name: {{ .Values.mongoImage.name | quote }}
          repo: {{ .Values.mongoImage.repo | quote }}
          imageType: {{ .Values.mongoImage.imageType | quote }}
  syncPolicy:
    automated: { prune: {{ .Values.auto_delete }}, selfHeal: true }
    retry:
      limit: 5
      backoff: { duration: 5s, factor: 2, maxDuration: 3m }
    syncOptions: [ "CreateNamespace=true", "ServerSideApply=true" ]
{{- end }}
