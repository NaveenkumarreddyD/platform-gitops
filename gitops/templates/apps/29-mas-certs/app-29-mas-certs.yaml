{{- if and (not .Values.rootOnly) .Values.enable.masCerts }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mas-certs.{{ .Values.clusterId }}.{{ .Values.instanceId }}
  namespace: {{ .Values.argoNamespace }}
  labels: { app.kubernetes.io/part-of: mas-platform }
  annotations: { argocd.argoproj.io/sync-wave: "29" }
  finalizers: [ resources-finalizer.argocd.argoproj.io ]
spec:
  revisionHistoryLimit: 10
  project: {{ .Values.project }}
  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ .Values.argoNamespace }}
  source:
    repoURL: {{ .Values.platform.repo_url | quote }}
    targetRevision: {{ .Values.platform.revision | quote }}
    path: workloads/mas-certs
    # MUST render through the Argo CD Vault Plugin: this chart's Secret templates contain
    # <path:...#tls_crt_b64> placeholders that only AVP can resolve. Using `source.helm`
    # here renders with native Helm and ships the literal "<path:...>" string into the
    # Secret data, which fails apply with "illegal base64 data at input byte 0". So we use
    # the AVP CMP sidecar (same plugin the account-root children use) and pass values via
    # the HELM_VALUES env the CMP's generate command reads ($ARGOCD_ENV_HELM_VALUES).
    plugin:
      name: argocd-vault-plugin-helm
      env:
        - name: HELM_VALUES
          value: |
            instanceId: {{ .Values.instanceId }}
            workspaceId: {{ .Values.workspaceId }}
            certPath: {{ include "gitops.path" . }}/certs/public
            core:
              enabled: {{ .Values.masCerts.core }}
            manage:
              enabled: {{ .Values.masCerts.manage }}
  syncPolicy:
    automated: { prune: {{ .Values.auto_delete }}, selfHeal: true }
    retry:
      limit: 5
      backoff: { duration: 5s, factor: 2, maxDuration: 3m }
{{- end }}
