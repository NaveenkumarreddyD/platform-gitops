# wave 11 — Vault auto-unseal CronJob (opt-in). Runs right after Vault (wave 10) so a sealed
# node after any pod restart is re-unsealed automatically from the keys Secret. Disabled by
# default; enable with enable.vaultUnseal + vault.autoUnseal.enabled and create the keys Secret
# (scripts/init-vault.sh --store-k8s-secret or scripts/setup-vault-autounseal.sh).
{{- if and (not .Values.rootOnly) .Values.enable.vaultUnseal .Values.vault.autoUnseal.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-unseal
  namespace: {{ .Values.argoNamespace }}
  labels: { app.kubernetes.io/part-of: mas-platform }
  annotations: { argocd.argoproj.io/sync-wave: "11" }
  finalizers: [ resources-finalizer.argocd.argoproj.io ]
spec:
  revisionHistoryLimit: 10
  project: {{ .Values.project }}
  destination: { server: https://kubernetes.default.svc, namespace: vault }
  source:
    repoURL: {{ .Values.platform.repo_url | quote }}
    targetRevision: {{ .Values.platform.revision | quote }}
    path: workloads/vault-unseal
    helm:
      values: |
        namespace: vault
        replicas: {{ .Values.vault.replicas }}
        internalService: vault-internal
        port: 8200
        scheme: http
        schedule: {{ .Values.vault.autoUnseal.schedule | quote }}
        keysSecret: {{ .Values.vault.autoUnseal.keysSecret }}
        image: {{ .Values.images.vault }}
        serviceAccount: vault-unseal
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    retry:
      limit: 5
      backoff: { duration: 5s, factor: 2, maxDuration: 3m }
    syncOptions: [ "CreateNamespace=true" ]
{{- end }}
