# wave 60 — Grafana CR + Thanos datasource + dashboards (local chart)
{{- if and (not .Values.rootOnly) .Values.enable.grafana }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-{{ .Values.clusterId }}
  namespace: {{ .Values.argoNamespace }}
  labels: { app.kubernetes.io/part-of: mas-platform }
  annotations: { argocd.argoproj.io/sync-wave: "60" }
  finalizers: [ resources-finalizer.argocd.argoproj.io ]
spec:
  revisionHistoryLimit: 10
  project: {{ .Values.project }}
  destination: { server: https://kubernetes.default.svc, namespace: {{ .Values.grafana.namespace }} }
  source:
    repoURL: {{ .Values.platform.repo_url | quote }}
    targetRevision: {{ .Values.platform.revision | quote }}
    path: workloads/grafana
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    retry:
      limit: 5
      backoff: { duration: 5s, factor: 2, maxDuration: 3m }
    syncOptions: [ "CreateNamespace=true" ]
{{- end }}
