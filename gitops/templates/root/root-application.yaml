# ROOT (app-of-apps parent). bootstrap/apply.sh applies ONLY this (--set rootOnly=true); ArgoCD renders the children.
{{- /* self-managing root: ArgoCD owns the generator, so editing gitops/<env>-*.yaml + commit
       re-renders every Application below (and this root). Applied once by bootstrap/apply.sh. */ -}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-{{ .Values.clusterId }}
  namespace: {{ .Values.argoNamespace }}
  labels: { app.kubernetes.io/part-of: mas-platform }
  finalizers: [ resources-finalizer.argocd.argoproj.io ]
  annotations: { argocd.argoproj.io/sync-wave: "-20" }
spec:
  revisionHistoryLimit: 10
  project: {{ .Values.project }}
  source:
    repoURL: {{ .Values.platform.repo_url | quote }}
    targetRevision: {{ .Values.platform.revision | quote }}
    path: gitops
    helm:
      valueFiles:
        - envs/{{ .Values.clusterId }}/common.yaml
        - envs/{{ .Values.clusterId }}/values.yaml
  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ .Values.argoNamespace }}
  syncPolicy:
    automated: { prune: {{ .Values.auto_delete }}, selfHeal: true }
    retry:
      limit: 5
      backoff: { duration: 5s, factor: 2, maxDuration: 3m }
