{{- if .Values.core.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: mas-{{ .Values.instanceId }}-core
---
# type: Opaque (NOT kubernetes.io/tls) to match the IBM suite app, which also declares this
# secret as Opaque. A kubernetes.io/tls type here makes the suite sync fail with
# "type: Invalid value Opaque: field is immutable" and the Suite CR is never created.
# The Suite operator reads .data['tls.crt'/'tls.key'/'ca.crt'] by key, so Opaque works.
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ .Values.instanceId }}-cert-public
  namespace: mas-{{ .Values.instanceId }}-core
data:
  tls.crt: <path:{{ .Values.certPath }}#tls_crt_b64>
  tls.key: <path:{{ .Values.certPath }}#tls_key_b64>
  ca.crt: <path:{{ .Values.certPath }}#ca_crt_b64>
{{- end }}
