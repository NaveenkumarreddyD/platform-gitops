# PINNED Mongo CA. The CA cert+key are generated ONCE by scripts/load-secrets.sh and stored in Vault;
# AVP renders them here. cert-manager's ca-issuer uses this fixed CA to sign the server cert, and
# mongocfg/sls/Manage trust the SAME CA (mongo#ca.crt). Because the CA is fixed in Vault (NOT
# regenerated by cert-manager each deploy/recreate), it never rotates -> mongocfg can never go
# InvalidConfiguration from a CA mismatch. (Previously cert-manager self-signed a fresh CA, which
# drifted from the Vault snapshot whenever the secret was recreated -> the recurring cert failures.)
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: "{{ .Values.resource }}-ca"
  namespace: "{{ .Values.namespace }}"
  annotations:
    # Prune=false: never let ArgoCD DELETE this CA out from under cert-manager + Mongo.
    # NOTE: we intentionally do NOT set `helm.sh/resource-policy: keep` here. `keep` froze the
    # live secret at whatever CA it was first created with, so if it ever held a non-pin CA the
    # server cert got signed by a stale CA while consumers trusted the pin -> permanent
    # CERTIFICATE_VERIFY_FAILED, and the load-secrets(pin) vs vault-sync(live) writers oscillated.
    # Without `keep`, ArgoCD continuously reconciles this secret to the pinned Vault CA, so the
    # live signing CA == pin == consumer trust, always. The pin is the single source of truth.
    argocd.argoproj.io/sync-options: Prune=false
data:
  tls.crt: {{ .Values.mongoCaCert }}
  tls.key: {{ .Values.mongoCaKey }}
  ca.crt:  {{ .Values.mongoCaCert }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata: { name: "{{ .Values.resource }}-ca-issuer", namespace: "{{ .Values.namespace }}" }
spec: { ca: { secretName: "{{ .Values.resource }}-ca" } }
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata: { name: "{{ .Values.resource }}-server", namespace: "{{ .Values.namespace }}" }
spec:
  secretName: "{{ .Values.resource }}-server-cert"
  duration: 8760h
  issuerRef: { name: "{{ .Values.resource }}-ca-issuer", kind: Issuer }
  dnsNames:
    - "{{ .Values.resource }}-svc.{{ .Values.namespace }}.svc.cluster.local"
    - "*.{{ .Values.resource }}-svc.{{ .Values.namespace }}.svc.cluster.local"
