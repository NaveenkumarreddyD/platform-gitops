# Admin + SLS-Mongo passwords sourced from Vault (AVP). The operator reads key `password`.
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: "{{ .Values.resource }}-admin-password"
  namespace: "{{ .Values.namespace }}"
stringData:
  password: "{{ .Values.adminPasswordPath }}"
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: "{{ .Values.resource }}-slsmongo-password"
  namespace: "{{ .Values.namespace }}"
stringData:
  password: "{{ .Values.slsmongoPasswordPath }}"
