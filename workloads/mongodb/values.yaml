# DEDICATED Mongo for this instance (NOT the shared mas-mongo-ce). Defaults overridden by the
# gitops mongodb-ce app via HELM_VALUES. Aligned to ibm.mas_devops mongodb role (community).
namespace: mongo-drgitops
resource: drgitopsapp-mongo
members: 3                       # ibm default mongodb_replicas=3 (3 data + 3 logs PVCs)
mongodbVersion: "7.0.23"         # spec.version (semver for the operator); 6->7 is MAJOR — fresh install only.
# Full mongod image, pinned on the container. Required: the community operator only appends the
# -<imageType> suffix for official repos (docker.io/mongodb, quay.io/mongodb); for quay.io/ibmmas it
# would emit a bare :<version> tag that doesn't exist. Composed from gitops/values.yaml mongoImage.
mongodbImage: "quay.io/ibmmas/mongo:7.0.23-ubi8-20250817T080412Z"
storageClass: isilon
dataSize: 20Gi                   # ibm default mongodb_storage_capacity_data
logsSize: 20Gi                   # ibm default mongodb_storage_capacity_logs
# ibm defaults: req 500m/1Gi, lim 1/1Gi
resources:
  requests: { cpu: "500m", memory: "1Gi" }
  limits:   { cpu: "1",    memory: "1Gi" }
adminUser: admin
slsmongoUser: slsmongo
createSccBinding: false          # platform root owns this before the operator app starts
adminPasswordPath: "<path:secret/data/mas/drroc4/drgitopsapp/mongo#password>"
slsmongoPasswordPath: "<path:secret/data/mas/drroc4/drgitopsapp/sls-mongo#password>"
# PINNED Mongo CA (base64 PEM), generated once by load-secrets.sh into Vault $IP/mongo-ca.
# app-25 overrides these with the live <path:...> refs; cert-manager ca-issuer signs the server cert
# with this CA and mongocfg trusts the same one -> the CA never rotates -> mongocfg never CA-mismatches.
mongoCaCert: "<path:secret/data/mas/drroc4/drgitopsapp/mongo-ca#tls_crt_b64>"
mongoCaKey: "<path:secret/data/mas/drroc4/drgitopsapp/mongo-ca#tls_key_b64>"
