# DEDICATED Mongo for this instance (NOT the shared mas-mongo-ce). Defaults overridden by the
# gitops mongodb-ce app via HELM_VALUES. Aligned to ibm.mas_devops mongodb role (community).
namespace: mongo-drgitops
resource: drgitopsapp-mongo
members: 3                       # ibm default mongodb_replicas=3 (3 data + 3 logs PVCs)
mongodbVersion: "7.0.23"         # MongoDB 7.0.23 (latest IBM 7.0 UBI8 build; certified for v9-250925).
                                 # Image = quay.io/ibmmas/mongo:7.0.23-ubi8-20250817T080412Z (repo+imageType set in gitops/values.yaml).
                                 # NOTE: 6->7 is a MAJOR upgrade — fresh install only, never an in-place push on live 6.x data.
storageClass: isilon
dataSize: 20Gi                   # ibm default mongodb_storage_capacity_data
logsSize: 20Gi                   # ibm default mongodb_storage_capacity_logs
# ibm defaults: req 500m/1Gi, lim 1/1Gi
resources:
  requests: { cpu: "500m", memory: "1Gi" }
  limits:   { cpu: "1",    memory: "1Gi" }
adminUser: admin
slsmongoUser: slsmongo
createSccBinding: false          # platform root owns this before the operator app starts
adminPasswordPath: "<path:secret/data/mas/drroc4/drgitopsapp/mongo#password>"
slsmongoPasswordPath: "<path:secret/data/mas/drroc4/drgitopsapp/sls-mongo#password>"
