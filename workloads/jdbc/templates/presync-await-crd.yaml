# PreSync hook: block the JDBC sync until the JdbcCfg CRD (installed by MAS Suite) is
# Established. This lets the JDBC Application use automated sync safely — ArgoCD will not
# attempt to apply the JdbcCfg until its CRD exists, so there is no fail/retry noise and no
# manual gate. If the CRD never appears within the deadline the hook fails and selfHeal
# retries on the next reconcile (BeforeHookCreation recreates the SA/RBAC each attempt).
{{- $ns := printf "mas-%s-core" .Values.instance_id -}}
{{- $sa := printf "%s-await-crd" .Values.mas_config_name -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $sa }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $sa }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $sa }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ $ns }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $sa }}
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.await_crd_deadline | default 1800 }}
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: {{ $sa }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: await-crd
          image: {{ .Values.cli_image_repo }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              crd="jdbccfgs.config.mas.ibm.com"
              echo "waiting for CRD ${crd} to be Established ..."
              for i in $(seq 1 180); do
                if oc get crd "${crd}" >/dev/null 2>&1 && \
                   [ "$(oc get crd "${crd}" -o jsonpath='{.status.conditions[?(@.type=="Established")].status}' 2>/dev/null)" = "True" ]; then
                  echo "CRD ${crd} is Established."
                  exit 0
                fi
                echo "  [$i/180] CRD not established yet; sleeping 10s"
                sleep 10
              done
              echo "ERROR: timed out waiting for CRD ${crd}" >&2
              exit 1
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 256Mi }
