apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ .Values.mas_config_name }}-crd-waiter"
  namespace: "mas-{{ .Values.instance_id }}-core"
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: "{{ .Values.mas_config_name }}-crd-waiter"
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "{{ .Values.mas_config_name }}-crd-waiter"
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "{{ .Values.mas_config_name }}-crd-waiter"
subjects:
  - kind: ServiceAccount
    name: "{{ .Values.mas_config_name }}-crd-waiter"
    namespace: "mas-{{ .Values.instance_id }}-core"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Values.mas_config_name }}-wait-crds"
  namespace: "mas-{{ .Values.instance_id }}-core"
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 1800
  template:
    spec:
      serviceAccountName: "{{ .Values.mas_config_name }}-crd-waiter"
      restartPolicy: Never
      containers:
        - name: wait
          image: "{{ .Values.cli_image_repo }}"
          command:
            - /bin/bash
            - -ceu
            - |
              echo "Waiting for MAS config CRDs before applying JdbcCfg..."
              oc wait crd/jdbccfgs.config.mas.ibm.com --for=condition=Established --timeout=30m
              oc wait crd/suites.core.mas.ibm.com --for=condition=Established --timeout=30m
