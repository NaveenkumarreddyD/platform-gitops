apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: thanos-querier
  namespace: {{ include "grafana.ns" . }}
spec:
  instanceSelector: { matchLabels: { dashboards: grafana } }
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom: { secretKeyRef: { name: grafana-sa-token, key: token } }
  datasource:
    name: Thanos
    type: prometheus
    access: proxy
    url: {{ .Values.thanosUrl }}
    isDefault: true
    jsonData: { httpHeaderName1: Authorization, timeInterval: 5s, tlsSkipVerify: true }
    secureJsonData: { httpHeaderValue1: "Bearer ${token}" }
