apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: {{ include "grafana.ns" . }}
  labels: { dashboards: grafana }
spec:
  config:
    auth: { disable_login_form: "false" }
    log: { mode: console }
    security: { admin_user: {{ .Values.adminUser }}, admin_password: "$__file{/etc/grafana-secrets/admin/password}" }
  version: {{ .Values.grafanaVersion | quote }}
  route:
    metadata: {}
    spec: { tls: { termination: edge } }
