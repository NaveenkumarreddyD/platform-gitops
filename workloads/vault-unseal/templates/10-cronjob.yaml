apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-unseal
  namespace: {{ .Values.namespace }}
  labels: { app.kubernetes.io/part-of: mas-platform, app.kubernetes.io/name: vault-unseal }
  annotations:
    # let ArgoCD treat the CronJob as healthy without waiting on a completed run
    argocd.argoproj.io/sync-options: "Prune=true"
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels: { app.kubernetes.io/name: vault-unseal }
        spec:
          serviceAccountName: {{ .Values.serviceAccount }}
          restartPolicy: Never
          containers:
            - name: unseal
              image: {{ .Values.image | quote }}
              command: ["/bin/sh", "/scripts/unseal.sh"]
              env:
                - { name: VAULT_REPLICAS,      value: {{ .Values.replicas | quote }} }
                - { name: VAULT_INTERNAL_SVC,  value: {{ .Values.internalService | quote }} }
                - { name: VAULT_NAMESPACE,     value: {{ .Values.namespace | quote }} }
                - { name: VAULT_PORT,          value: {{ .Values.port | quote }} }
                - { name: VAULT_SCHEME,        value: {{ .Values.scheme | quote }} }
                - { name: KEYS_DIR,            value: "/vault-keys" }
              volumeMounts:
                - { name: keys,   mountPath: /vault-keys, readOnly: true }
                - { name: script, mountPath: /scripts }
          volumes:
            - name: keys
              secret:
                secretName: {{ .Values.keysSecret }}
                optional: false
            - name: script
              configMap:
                name: vault-unseal-script
                defaultMode: 0755
