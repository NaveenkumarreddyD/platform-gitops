# Declarative alternative to 'argocd cluster add'. Apply on the MANAGEMENT cluster.
# The 'server' value MUST exactly match cluster.url in mas/<cluster>/ibm-mas-cluster-base.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-CHANGE_ME_CLUSTER
  namespace: openshift-gitops
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: CHANGE_ME_CLUSTER
  server: https://CHANGE_ME_SPOKE_API:6443
  config: |
    {
      "bearerToken": "CHANGE_ME_SPOKE_SA_TOKEN",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "CHANGE_ME_SPOKE_API_CA_BASE64"
      }
    }
