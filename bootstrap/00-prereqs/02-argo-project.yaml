apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mas
  namespace: openshift-gitops
spec:
  description: MAS GitOps applications
  # SOURCES — only these repos may be deployed from (match the repo_urls in gitops/values.yaml).
  sourceRepos:
    - https://github.com/NaveenkumarreddyD/platform-gitops.git
    - https://github.com/NaveenkumarreddyD/mas-config-repo.git
    - https://github.com/ibm-mas/gitops.git
    - "https://gitlab.lac1.biz/gitops/*"
    - https://helm.releases.hashicorp.com        # Vault chart
    - https://mongodb.github.io/helm-charts       # MongoDB Community Operator chart
  # DESTINATIONS — in-cluster ONLY. This server lock is the guardrail that matters for this topology:
  # each ArgoCD manages exactly one cluster, so this prevents any cross-cluster deploy. Namespace is
  # left open because IBM's account-root generates apps whose destinations can't be fully enumerated
  # up front — e.g. cluster-scoped RBAC apps (application-admin-rbac) use namespace 'default'. Since
  # the resource-kind whitelists below are already '*/*', per-namespace restriction adds little while
  # reliably breaking the IBM-generated apps. To re-tighten to an explicit list after a clean install,
  # enumerate the real set first:
  #   oc get applications -n openshift-gitops \
  #     -o jsonpath='{range .items[*]}{.spec.destination.namespace}{"\n"}{end}' | sort -u
  destinations:
    - { server: "https://kubernetes.default.svc", namespace: "*" }
  # RESOURCE KINDS — left open on purpose: MAS + its operators create a wide, hard-to-enumerate
  # set of cluster- and namespace-scoped kinds, and restricting these reliably blocks the install.
  # The real guardrails above (sources + in-cluster destinations) catch the dangerous mistakes.
  clusterResourceWhitelist:
    - { group: "*", kind: "*" }
  namespaceResourceWhitelist:
    - { group: "*", kind: "*" }
