# How the AVP sidecar authenticates to Vault. k8s auth + role mas-gitops (created by
# scripts/setup-vault-auth.sh). For Vault on a VM: set VAULT_ADDR to the VM URL and either
# keep k8s auth or switch AVP_AUTH_TYPE to approle (+ AVP_ROLE_ID/AVP_SECRET_ID); add VAULT_CACERT.
apiVersion: v1
kind: Secret
metadata:
  name: argocd-vault-plugin-credentials
  namespace: openshift-gitops
type: Opaque
stringData:
  AVP_TYPE: vault
  AVP_AUTH_TYPE: k8s
  AVP_K8S_ROLE: mas-gitops
  VAULT_ADDR: http://vault-active.vault.svc.cluster.local:8200
