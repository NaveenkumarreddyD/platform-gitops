# Lets Vault validate the repo-server SA token during k8s-auth login (TokenReview).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-repo-server-tokenreview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-repo-server
    namespace: openshift-gitops
