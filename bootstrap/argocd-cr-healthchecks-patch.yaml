# Registers the IBM MAS custom resource healthchecks on the OpenShift GitOps ArgoCD CR.
# WHY: without these, ArgoCD treats MAS CRs (Suite, MongoCfg, SlsCfg, JdbcCfg, BasCfg,
# ManageApp/Workspace, LicenseService, OLM Subscriptions/InstallPlans/CatalogSource, Db2u)
# as Healthy the moment they exist, so sync waves race ahead before a CR is actually ready
# (the "Synced/Healthy but Suite is IncompleteConfiguration" trap). These health.lua scripts
# make Argo report real CR health, so wave ordering becomes meaningful and self-orchestrating.
#
# Format matches the official ibm-mas/cli bootstrap argocd.yaml: spec.extraConfig is rendered
# into argocd-cm by the gitops operator. Applied by bootstrap/apply.sh as a merge patch.
#
# NOTE: resourceTrackingMethod is intentionally left unset to preserve the current
# annotation-based tracking (avoids churn on an existing install). The healthchecks below
# are byte-for-byte the IBM upstream set.
spec:
  resourceExclusions: |
    - apiGroups:
      - tekton.dev
      clusters:
      - '*'
      kinds:
      - TaskRun
      - PipelineRun
  extraConfig:
    resource.customizations: |
      sls.ibm.com/LicenseService:
        health.lua: |
          hs = {}
          if obj.status ~= nil then
            if obj.status.conditions ~= nil then
              for i, condition in ipairs(obj.status.conditions) do
                if condition.type == "Failure" and condition.status == "True" then
                  hs.status = "Degraded"
                  hs.message = condition.message
                  return hs
                end
                if condition.type == "Ready" and condition.status == "True" then
                  hs.status = "Healthy"
                  hs.message = condition.message
                  return hs
                end
              end
            end
          end
          hs.status = "Progressing"
          hs.message = ""
          return hs

