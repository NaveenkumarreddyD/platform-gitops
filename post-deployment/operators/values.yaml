# OLM operators. MongoDB is NOT here — IBM installs the MongoDB Community Operator via its own
# deployment (mongodb-kubernetes-operator), so it's deployed as a Helm app (see gitops generator),
# not OLM. This chart installs the community grafana-operator used by the ibm.mas_devops grafana role.
operatorsNamespace: platform-operators
clusterScoped: true
operators:
  - name: grafana-operator
    package: grafana-operator
    channel: v5                       # ibm grafana role: community grafana-operator v5
    source: community-operators
    sourceNamespace: openshift-marketplace
    startingCSV: grafana-operator.v5.21.2   # PIN: v5.22.x CRD breaks on OCP < 4.19 (you are 4.18.30)
    installPlanApproval: Manual             # Manual holds it at 5.21.2 (Automatic would jump to broken 5.22)
